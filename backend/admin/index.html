<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeRoam Admin</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-icon">🛡️</div>
            <h1>SafeRoam Admin</h1>
            <p class="login-subtitle">Emergency Monitoring Dashboard</p>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="admin@saferoam.app" value="admin@saferoam.app" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" value="admin123" required>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>
            <p class="login-footer">Authorized personnel only</p>
        </div>
    </div>
    <script>
        function handleLogin(e) {
            e.preventDefault();
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
