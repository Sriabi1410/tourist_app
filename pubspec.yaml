name: tourist_safety
description: SafeRoam — Tourist Safety & Emergency Assistance System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  http: ^1.2.1
  intl: ^0.19.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  url_launcher: ^6.2.5
  image_picker: ^1.0.7
  flutter_local_notifications: ^17.0.0
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.0
  animate_do: ^3.3.4
  shimmer: ^3.0.0
  fl_chart: ^0.66.2
  uuid: ^4.3.3
  crypto: ^3.0.3
  percent_indicator: ^4.2.3
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/guides/

  fonts:
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora-Regular.ttf
          weight: 400
        - asset: assets/fonts/Sora-Medium.ttf
          weight: 500
        - asset: assets/fonts/Sora-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Sora-Bold.ttf
          weight: 700